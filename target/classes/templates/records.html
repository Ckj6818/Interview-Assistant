<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>面试记录 - MindSpark 面之�</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-theme.css}">
    <style>
        .record-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .record-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border-color: var(--border-color-hover);
        }
    </style>
</head>
<body>

<!-- 侧边�?-->
<div class="sidebar d-flex flex-column justify-content-between py-4">
    <div>
        <div class="logo-container mb-4 px-3">
            <div class="logo-icon me-2">
                <i class="bi bi-robot text-white fs-5"></i>
            </div>
            <div>
                <h4 class="logo-text m-0 fw-bold text-white" style="font-size: 1.1rem; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MindSpark 面之�</h4>
                <div style="color: #64748b; font-size: 0.75rem; font-weight: 500;">智能面试辅助平台</div>
            </div>
        </div>
        <div class="px-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-grid-fill me-2"></i> 系统首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/questions"><i class="bi bi-journal-text me-2"></i> 题库大厅</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/mock-interview"><i class="bi bi-mic me-2"></i> 模拟面试</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/copilot"><i class="bi bi-rocket-takeoff me-2"></i> 面试助手</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/resume"><i class="bi bi-file-earmark-person me-2"></i> 简历优�</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/records"><i class="bi bi-clock-history me-2"></i> 面试记录</a>
                </li>
                
            </ul>
        </div>
    </div>

    <div class="px-3">
        <form action="/logout" method="post" style="margin: 0;">
            <button type="submit" class="nav-link py-2 px-1 text-start" style="font-size: 0.88rem; gap: 8px; border: none; background: transparent; width: 100%; cursor: pointer;">
               <i class="bi bi-box-arrow-right me-2"></i> 退出登�?            </button>
        </form>
    </div>
</div>

<!-- 右侧主体 -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-white mb-0">我的面试记录</h2>
        <button id="clearRecordsBtn" class="btn btn-outline-danger btn-sm rounded-pill px-3" th:if="${records != null && records.size() > 0}">
            <i class="bi bi-trash3 me-1"></i> 清空记录
        </button>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="record : ${records}">
            <div class="card h-100 record-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold text-white text-truncate" th:text="${record.topic}" style="max-width: 70%;">面试项目</h5>
                        <span class="badge bg-success bg-opacity-20 text-success rounded-pill px-3 fs-6" th:text="${record.score} + ' �?">90 �</span>
                    </div>
                    <p class="card-text text-white-50 small mb-3">
                        <i class="bi bi-calendar3 me-1"></i> <span th:text="${#temporals.format(record.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                    </p>
                    <p class="card-text text-white-50" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="${record.feedbackReport}">
                        报告摘要...
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 text-end pb-3">
                    <a th:href="@{'/report/' + ${record.id}}" class="btn btn-sm btn-outline-primary rounded-pill px-3">查看评估报告</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${records == null || records.size() == 0}" class="text-center py-5 text-white-50">
        <i class="bi bi-clipboard-x fs-1 text-white-50"></i>
        <p class="mt-3">您还没有任何模拟面试记录。立即前往 <a th:href="@{/questions}" class="text-primary text-decoration-none">题库大厅</a> �?<a th:href="@{/mock-interview}" class="text-info text-decoration-none">全真模拟面试</a> 开启第一场对练吧�</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.querySelector('.sidebar-toggle')) {
            const toggleBtn = document.createElement('div');
            toggleBtn.className = 'sidebar-toggle';
            toggleBtn.innerHTML = '<i class="bi bi-chevron-left"></i>';
            toggleBtn.onclick = function() {
                sidebar.classList.toggle('collapsed');
                const mainContent = document.querySelector('.main-content');
                if (mainContent) mainContent.classList.toggle('expanded');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            };
            sidebar.appendChild(toggleBtn);
            
            document.querySelectorAll('.sidebar .nav-link, .sidebar .btn').forEach(el => {
                Array.from(el.childNodes).forEach(node => {
                    if (node.nodeType === Node.TEXT_NODE && node.textContent.trim().length > 0) {
                        const span = document.createElement('span');
                        span.className = 'nav-text';
                        span.textContent = node.textContent;
                        el.replaceChild(span, node);
                    }
                });
            });

            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
                const mainContent = document.querySelector('.main-content');
                if (mainContent) mainContent.classList.add('expanded');
            }
        }
    });
    
    const clearRecordsBtn = document.getElementById('clearRecordsBtn');
    if (clearRecordsBtn) {
        clearRecordsBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有的面试记录吗？此操作不可恢复�?)) {
                const btnOriginalHTML = clearRecordsBtn.innerHTML;
                clearRecordsBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span> 清空�?..';
                clearRecordsBtn.disabled = true;
                
                fetch('/api/records/clear', {
                    method: 'DELETE'
                }).then(response => response.json())
                  .then(data => {
                      if (data.success) {
                          window.location.reload();
                      } else {
                          alert('清空失败: ' + data.message);
                          clearRecordsBtn.innerHTML = btnOriginalHTML;
                          clearRecordsBtn.disabled = false;
                      }
                  }).catch(error => {
                      alert('网络异常');
                      clearRecordsBtn.innerHTML = btnOriginalHTML;
                      clearRecordsBtn.disabled = false;
                  });
            }
        });
    }
</script>
</body>
</html>
