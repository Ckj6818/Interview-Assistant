    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .navbar-dark-custom {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            border-bottom: 1px solid #374151;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 25% 50% 25%;
            overflow: hidden;
            height: calc(100vh - 73px);
        }
        
        /* ���������ʽ */
        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 15px;
            height: 100%;
        }
        .left-panel {
            border-right: 1px solid #1f2937;
            background-color: #0d1321;
        }
        .middle-panel {
            background-color: #090d16;
            border-right: 1px solid #1f2937;
        }
        .right-panel {
            background-color: #0d1321;
        }

        .card-dark {
            background: rgba(22, 30, 49, 0.4);
            border: 1px solid #1f2937;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .card-dark:hover {
            border-color: #374151;
        }
        .card-header-dark {
            background-color: rgba(17, 24, 39, 0.8);
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* �����������ʽ */
        .speech-bubble {
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 15px;
            max-width: 100%;
            animation: fadeIn 0.3s ease-out;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .suggestion-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-left: 5px solid #f59e0b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .analysis-card {
            background: linear-gradient(135deg, #111827, #0f172a);
            border-left: 5px solid #3b82f6;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease-out;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        
        /* ¼����ζ��� */
        .wave-container {
            display: flex;
            align-items: center;
            height: 20px;
            gap: 4px;
        }
        .wave-bar {
            width: 3px;
            height: 100%;
            background-color: #10b981;
            animation: wave 1s ease-in-out infinite;
            display: none;
            border-radius: 2px;
        }
        .recording .wave-bar {
            display: block;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .wave-bar:nth-child(3) { animation-delay: 0.3s; }
        .wave-bar:nth-child(4) { animation-delay: 0.45s; }
        .wave-bar:nth-child(5) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
        
        .status-badge {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 30px;
            letter-spacing: 0.5px;
        }
        
        /* ���������� */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        /* ����ģʽ (Stealth Mode) */
        body.stealth-mode {
            background-color: #000;
            color: #555;
        }
        .stealth-mode .navbar-dark-custom {
            display: none !important;
        }
        .stealth-mode .main-container {
            height: 100vh;
        }
        .stealth-mode .card-dark, .stealth-mode .panel, .stealth-mode .left-panel, .stealth-mode .middle-panel, .stealth-mode .right-panel {
            background: #000 !important;
            border: none !important;
            box-shadow: none !important;
        }
        .stealth-mode .card-header-dark, .stealth-mode .badge, .stealth-mode .btn, .stealth-mode i, .stealth-mode .input-group {
            display: none !important;
        }
        .stealth-mode .speech-bubble, .stealth-mode .suggestion-card, .stealth-mode .analysis-card {
            background: #000 !important;
            border: none !important;
            box-shadow: none !important;
            color: #555 !important;
            font-family: 'Consolas', monospace;
            font-size: 11px !important;
            padding: 2px 0;
            margin: 0 0 5px 0;
        }
        .stealth-mode .text-warning, .stealth-mode .text-primary, .stealth-mode .text-white, .stealth-mode .text-muted {
            color: #444 !important;
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/modern-theme.css}">

<body>

<div class="main-container">
    <!-- ��ࣺ������ͼ���� -->
    <div class="panel left-panel">
        <div class="card-dark">
            <div class="card-header-dark" style="color: #60a5fa;">
                <span><i class="bi bi-search me-2"></i> �����������ͼ����</span>

    <!-- �м䣺AI ʵʱ��ʾ��/�߷ֻش� -->
    <div class="panel middle-panel">

            <div class="card-header-dark" style="color: #f59e0b; border-bottom: 1px solid #1f2937;">
                <span><i class="bi bi-chat-left-text me-2"></i> ʵʱ�߷ֱ�ｨ��</span>

                <div class="wave-container" id="waveAnimation">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>

                    <div class="wave-bar"></div>

            <div class="card-body-scroll" id="transcriptionBox">
                <div class="text-center text-muted py-5" id="listeningPlaceholder">
                    <i class="bi bi-volume-up fs-1 mb-3 text-secondary"></i>
                    <p class="small">����·�����ʼ��������AI �Ჶ׽��չʾʵʱ����תд�ı�</p>
                </div>
            </div>
            
            <div class="p-3 border-top border-secondary bg-dark bg-opacity-25 d-flex gap-2">
                <button class="btn btn-success flex-grow-1 py-3 fw-bold" id="startBtn" style="border-radius: 12px;">
                    <i class="bi bi-play-fill me-1"></i> ��ʼ���� (������)

                    <i class="bi bi-stop-fill"></i>
                </button>

            <div class="px-3 pb-3">
                <div class="input-group">
                    <input type="text" class="form-control bg-dark border-secondary text-white" id="manualInput" placeholder="�ڴ˴��ֶ������������..." style="border-radius: 8px 0 0 8px;">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const appStatus = document.getElementById('appStatus');
    const transcriptionBox = document.getElementById('transcriptionBox');
    const suggestionBox = document.getElementById('suggestionBox');
    const analysisBox = document.getElementById('analysisBox');
    const modeSelect = document.getElementById('modeSelect');
    
    const listeningPlaceholder = document.getElementById('listeningPlaceholder');
    const suggestionPlaceholder = document.getElementById('suggestionPlaceholder');
    const analysisPlaceholder = document.getElementById('analysisPlaceholder');
    const waveAnimation = document.getElementById('waveAnimation');
    const manualInput = document.getElementById('manualInput');
    const manualSubmit = document.getElementById('manualSubmit');

    let recognition = null;
    let isListening = false;
    let currentBubble = null;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-CN';

        recognition.onstart = () => {
            isListening = true;
            appStatus.innerText = '���ڼ���';
            appStatus.className = 'status-badge bg-success text-white';
            waveAnimation.classList.add('recording');
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        recognition.onresult = (event) => {
            if (listeningPlaceholder) listeningPlaceholder.remove();
            
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            if (!currentBubble) {
                currentBubble = document.createElement('div');
                currentBubble.className = 'speech-bubble';
                transcriptionBox.appendChild(currentBubble);
            }

            currentBubble.innerText = finalTranscript || interimTranscript;
            transcriptionBox.scrollTop = transcriptionBox.scrollHeight;

            if (finalTranscript) {
                getAiSuggestion(finalTranscript);
                currentBubble = null;
            }
        };

        recognition.onend = () => {
            if (isListening) {
                recognition.start();
            }
        };

        recognition.onerror = (err) => {
            console.error('Speech recognition error:', err);
        };
    } else {
        startBtn.innerText = '��֧���������';
        startBtn.disabled = true;
    }

    startBtn.addEventListener('click', () => {
        if (recognition) {
            recognition.start();
        }
    });

    stopBtn.addEventListener('click', () => {
        isListening = false;
        if (recognition) {
            recognition.stop();
        }
        appStatus.innerText = '������ͣ';
        appStatus.className = 'status-badge bg-secondary text-white';
        waveAnimation.classList.remove('recording');
        startBtn.disabled = false;
        stopBtn.disabled = true;
    });

    clearBtn.addEventListener('click', () => {
        transcriptionBox.innerHTML = '';
        suggestionBox.innerHTML = '';
        analysisBox.innerHTML = '';
        currentBubble = null;
    });

    manualSubmit.addEventListener('click', () => {
        const text = manualInput.value.trim();
        if (!text) return;
        
        if (listeningPlaceholder) listeningPlaceholder.remove();
        const bubble = document.createElement('div');
        bubble.className = 'speech-bubble';
        bubble.innerHTML = `<span class="badge bg-secondary me-1">�ֶ�</span>${text}`;
        transcriptionBox.appendChild(bubble);
        transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
        
        getAiSuggestion(text);
        manualInput.value = '';
    });

    async function getAiSuggestion(text) {
        if (suggestionPlaceholder) suggestionPlaceholder.remove();
        if (analysisPlaceholder) analysisPlaceholder.remove();

        const selectedMode = modeSelect.value;

        // 1. ���� AI ��ʿ�Ƭ�������Ƭ����ʾ���ڼ���
        const cardAnswer = document.createElement('div');
        cardAnswer.className = 'suggestion-card';
        cardAnswer.innerHTML = `
            <div class="text-warning small mb-2"><i class="bi bi-cpu"></i> AI ʵʱ��ʽ�����...</div>
            <div class="lh-lg" style="color: #94a3b8;">����Ϊ�����ɻش���...</div>
        `;
        suggestionBox.appendChild(cardAnswer);
        suggestionBox.scrollTop = suggestionBox.scrollHeight;

        const cardAnalysis = document.createElement('div');
        cardAnalysis.className = 'analysis-card';
        cardAnalysis.innerHTML = `
            <div class="text-primary small mb-2"><i class="bi bi-cpu"></i> ������...</div>
            <div class="lh-lg" style="color: #94a3b8;">�������������ͼ...</div>
        `;
        analysisBox.appendChild(cardAnalysis);
        analysisBox.scrollTop = analysisBox.scrollHeight;

        try {
            const response = await fetch('/api/copilot/suggest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, mode: selectedMode })
            });
            const data = await response.json();

            if (data.success) {
                // ��ʽ�����Ϊ����תΪHTML
                const formattedAnalysis = (data.analysis || '').replace(/\n/g, '<br>');
                const formattedAnswer = (data.answer || '').replace(/\n/g, '<br>');
                
                cardAnalysis.innerHTML = `
                    <div class="text-primary small mb-2 fw-bold"><i class="bi bi-search"></i> ���Թ���ͼ</div>
                    <div class="text-white">${formattedAnalysis}</div>
                `;
                
                cardAnswer.innerHTML = `
                    <div class="text-warning small mb-2 fw-bold"><i class="bi bi-lightbulb-fill"></i> ������⣺��${text}��</div>
                    <div class="lh-lg text-white" style="font-size: 1.05rem;">${formattedAnswer}</div>
                `;
            } else {
                cardAnalysis.innerHTML = `<div class="text-danger">���ʧ��</div>`;
                cardAnswer.innerHTML = `<div class="text-danger">AI ���ʧ��</div>`;
            }
        } catch (error) {
            cardAnalysis.innerHTML = `<div class="text-danger">���Ӵ���</div>`;
            cardAnswer.innerHTML = `<div class="text-danger">�����ӳ�/���Ӵ���</div>`;
        }
    }

    // ==========================================
    // ����ģʽ (Stealth Mode) - Esc ���л�
    // ==========================================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.body.classList.toggle('stealth-mode');
        }
    });

    // ==========================================
    // ��ͼ OCR �ϴ� (֧�� Ctrl+V �� ��ק)
    // ==========================================
    window.addEventListener('paste', e => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let index in items) {
            const item = items[index];
            if (item.kind === 'file' && item.type.startsWith('image/')) {
                const blob = item.getAsFile();
                uploadImageForOcr(blob);
            }
        }
    });

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
    });

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            const file = e.dataTransfer.files[0];
            if (file.type.startsWith('image/')) {
                uploadImageForOcr(file);
            }
        }
    });

    async function uploadImageForOcr(file) {
        if (suggestionPlaceholder) suggestionPlaceholder.remove();
        if (analysisPlaceholder) analysisPlaceholder.remove();

        const cardAnswer = document.createElement('div');
        cardAnswer.className = 'suggestion-card';
        cardAnswer.innerHTML = `<div class="lh-lg" style="color: #94a3b8;">�������ζ�ȡ��Ļ����...</div>`;
        suggestionBox.appendChild(cardAnswer);
        suggestionBox.scrollTop = suggestionBox.scrollHeight;

        const cardAnalysis = document.createElement('div');
        cardAnalysis.className = 'analysis-card';
        cardAnalysis.innerHTML = `<div class="lh-lg" style="color: #94a3b8;">OCR ��Ƚ�����...</div>`;
        analysisBox.appendChild(cardAnalysis);
        analysisBox.scrollTop = analysisBox.scrollHeight;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('mode', modeSelect.value);

        try {
            const response = await fetch('/api/copilot/ocr-suggest', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                const formattedAnalysis = (data.analysis || '').replace(/\n/g, '<br>');
                const formattedAnswer = (data.answer || '').replace(/\n/g, '<br>');
                const formattedOcr = (data.ocrText || '').replace(/\n/g, '<br>');
                
                cardAnalysis.innerHTML = `
                    <div class="text-primary small mb-2 fw-bold"><i class="bi bi-camera"></i> ��ȡ������/�ı� (����У��)</div>
                    <div class="text-white small mb-3 opacity-50" style="max-height: 80px; overflow-y: auto;">${formattedOcr}</div>
                    <div class="text-primary small mb-2 fw-bold"><i class="bi bi-search"></i> �������</div>
                    <div class="text-white">${formattedAnalysis}</div>
                `;
                
                cardAnswer.innerHTML = `
                    <div class="text-warning small mb-2 fw-bold"><i class="bi bi-lightbulb-fill"></i> ���Ĵ���/���ֽ��</div>
                    <div class="lh-lg text-white" style="font-size: 1.05rem;">${formattedAnswer}</div>
                `;
            } else {
                cardAnalysis.innerHTML = `<div class="text-danger">OCR ʶ��ʧ��</div>`;
                cardAnswer.innerHTML = `<div class="text-danger">${data.error || '����ʧ��'}</div>`;
            }
        } catch (error) {
            cardAnalysis.innerHTML = `<div class="text-danger">����ʱ</div>`;
            cardAnswer.innerHTML = `<div class="text-danger">�������ӶϿ�</div>`;
        }
    }
</script>
