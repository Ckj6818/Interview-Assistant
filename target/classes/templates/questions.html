<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>题库大厅 - MindSpark 面之光</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #07090e;
            --bg-sidebar: #090b11;
            --bg-surface: rgba(17, 24, 39, 0.45);
            --bg-card: #111422;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-color-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --color-primary: #2563eb;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            min-height: 100vh;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            position: fixed;
            width: 260px;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-icon {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .nav-link {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.92rem;
            margin-bottom: 0.3rem;
            border-radius: 8px;
            padding: 10px 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .nav-link.active {
            background-color: var(--color-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .main-content {
            margin-left: 260px;
            padding: 2rem 2.5rem;
            min-height: 100vh;
        }

        /* Filter Pills styling */
        .filter-pill {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-pill:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #f8fafc;
        }

        .filter-pill.active {
            background: #0f172a;
            border-color: #3b82f6;
            color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
        }

        /* Outline layout */
        .chapter-accordion {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chapter-card:hover {
            border-color: var(--border-color-hover);
        }

        .chapter-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.01);
            user-select: none;
        }

        .chapter-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .chapter-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chapter-indicator {
            width: 4px;
            height: 18px;
            border-radius: 2px;
        }
        .chapter-easy .chapter-indicator { background: var(--color-success); }
        .chapter-medium .chapter-indicator { background: var(--color-warning); }
        .chapter-hard .chapter-indicator { background: var(--color-danger); }

        .chapter-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin: 0;
            color: var(--text-primary);
        }

        .chapter-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chapter-progress-badge {
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .chapter-toggle-icon {
            font-size: 1rem;
            color: var(--text-secondary);
            transition: transform 0.3s ease;
        }

        .chapter-card.expanded .chapter-toggle-icon {
            transform: rotate(180deg);
        }

        .chapter-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.005);
        }

        .chapter-card.expanded .chapter-body {
            max-height: 2000px;
        }

        .chapter-content {
            padding: 20px;
        }

        .section-wrapper {
            margin-bottom: 22px;
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Question cards */
        .question-row-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.25s ease;
        }

        .question-row-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .question-left-side {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex-grow: 1;
        }

        .question-row-title {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .question-right-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge-difficulty {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            display: inline-block;
            text-align: center;
            min-width: 55px;
        }

        .difficulty-easy { background-color: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.15); }
        .difficulty-medium { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.15); }
        .difficulty-hard { background-color: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.15); }

        .badge-type {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .type-code { background-color: rgba(139, 92, 246, 0.1); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.15); }
        .type-conceptual { background-color: rgba(6, 182, 212, 0.1); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.15); }

        .btn-challenge {
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-challenge-solid {
            background-color: var(--color-primary);
            border: none;
            color: white;
        }

        .btn-challenge-solid:hover {
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
            color: white;
        }

        .btn-challenge-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-challenge-outline:hover {
            background-color: rgba(255,255,255,0.05);
            border-color: var(--color-primary);
            color: var(--text-primary);
        }

        /* Filters Toolbar */
        .filter-toolbar {
            background-color: #11131e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 18px;
        }

        .search-box {
            background-color: rgba(10, 15, 26, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 250px;
        }

        .search-input {
            background: none;
            border: none;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            font-size: 0.88rem;
        }

        .filter-select {
            background-color: rgba(10, 15, 26, 0.4);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-outline-action {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline-action:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .btn-view-toggle {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-view-toggle.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        /* Leetcode Table styles */
        .table-container {
            background-color: #11131e;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }

        .leetcode-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leetcode-table th {
            background-color: rgba(255, 255, 255, 0.02);
            padding: 14px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
        }

        .leetcode-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.92rem;
            vertical-align: middle;
            background-color: transparent;
        }

        .leetcode-table tr:last-child td {
            border-bottom: none;
        }

        .leetcode-table tr:hover td {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .badge-category {
            background-color: rgba(59, 130, 246, 0.08);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.15);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/modern-theme.css}">
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar d-flex flex-column justify-content-between py-4">
    <div>
        <div class="logo-container mb-4 px-3">
            <div class="logo-icon me-2">
                <i class="bi bi-robot text-white fs-5"></i>
            </div>
            <div>
                <h4 class="logo-text m-0 fw-bold text-white" style="font-size: 1.1rem; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MindSpark 面之光</h4>
                <div style="color: #64748b; font-size: 0.75rem; font-weight: 500;">智能面试辅助平台</div>

               <i class="bi bi-box-arrow-right me-2"></i> 退出登录

</div>

<div class="main-content">
    <!-- Top Header Bar -->
    <div class="d-flex justify-content-between align-items-center mb-5" style="padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <!-- Breadcrumbs -->
        <div class="breadcrumbs" style="font-size: 0.9rem; font-weight: 500;">
            <span style="color: #64748b; cursor: pointer;" onclick="goBackToLibrary()">MindSpark AI</span>
            <span style="color: #475569; margin: 0 8px;">/</span>
            <span id="breadcrumb-current" style="color: #f1f5f9;">题库大厅</span>
        </div>
        
        <!-- Top Right Actions -->
        <div class="d-flex align-items-center gap-3">
            <!-- Search prompts input -->
            <div class="position-relative" style="width: 260px;">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3" style="color: #64748b; font-size: 0.9rem;"></i>
                <input type="text" id="top-search-input" placeholder="搜索题目..." 
                       style="width: 100%; padding: 8px 12px 8px 38px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: #0f1322; color: #f8fafc; font-size: 0.85rem; outline: none; transition: border-color 0.2s;"
                       onfocus="this.style.borderColor='rgba(59,130,246,0.5)'"
                       onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
            </div>
        </div>
    </div>

    <!-- VIEW 1: CATEGORY GRID (Mockup View) -->
    <div id="category-grid-section">
        <!-- Page Header -->
        <div class="mb-5">
            <h1 style="font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 0.6rem; letter-spacing: -0.8px;">题库大厅</h1>
            <p style="color: #94a3b8; font-size: 0.95rem; max-width: 750px; line-height: 1.6;">海量大厂经典算法与底层架构真题，通过多维 AI 评估您的全景专业实力。请选择分类开始练习。</p>
        </div>

        <!-- Filter pills -->
        <div class="d-flex align-items-center gap-2 mb-5">
            <button class="filter-pill active" data-filter="All" onclick="filterGrid('All')">全部题库</button>
            <button class="filter-pill" data-filter="Technical" onclick="filterGrid('Technical')">技术问题</button>
            <button class="filter-pill" data-filter="Behavioral" onclick="filterGrid('Behavioral')">行为问题</button>
            <button class="filter-pill" data-filter="Leadership" onclick="filterGrid('Leadership')">领导力</button>
        </div>

        <!-- Cards Grid -->
        <div class="row g-4" id="category-grid">
            <!-- Populated dynamically via JS -->
        </div>
    </div>

    <!-- VIEW 2: QUESTION LIST DETAILS -->
    <div id="question-list-section" style="display: none;">
        <!-- Category detail header with back button -->
        <div class="mb-4">
            <button class="btn btn-link text-secondary p-0 mb-3 text-decoration-none d-flex align-items-center gap-2" 
                    style="font-size: 0.9rem; font-weight: 600;" 
                    onclick="goBackToLibrary()">
                <i class="bi bi-arrow-left"></i> Back to Interview Library
            </button>
            
            <div class="d-flex justify-content-between align-items-end">
                <div>
                    <h2 class="fw-bold text-white m-0" id="detail-category-title" style="font-size: 1.8rem; letter-spacing: -0.5px;">软件工程</h2>
                    <p class="text-secondary m-0 mt-2" id="detail-category-desc" style="font-size: 0.92rem; max-width: 650px; line-height: 1.5;">算法、数据结构、调试与核心语言概念。</p>
                </div>
                <!-- Progress display -->
                <div class="d-flex flex-column align-items-end" id="detail-progress-wrapper" style="min-width: 180px;">
                    <span class="fw-bold text-white mb-2" id="detail-category-progress" style="font-size: 0.9rem;">0% Completed</span>
                    <div class="progress" style="width: 160px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;">
                        <div class="progress-bar bg-success" id="detail-category-progress-bar" style="width: 0%; height: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters and controls toolbar (Difficulty, Type, Status, Reset) -->
        <form id="filter-form" onsubmit="event.preventDefault(); return false;" class="filter-toolbar mb-4">
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <!-- Search within category -->
                <div class="search-box">
                    <i class="bi bi-search text-secondary"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="在当前分类中搜索题目...">
                </div>

                <!-- Difficulty Select -->
                <select id="difficulty-select" class="filter-select" onchange="onFilterChange()">
                    <option value="">所有难度</option>
                    <option value="简单">简单</option>
                    <option value="中等">中等</option>
                    <option value="困难">困难</option>
                </select>

                <!-- Type Select -->
                <select id="type-select" class="filter-select" onchange="onFilterChange()">
                    <option value="">所有类型</option>
                    <option value="code">编程题</option>
                    <option value="conceptual">概念题</option>
                </select>

                <!-- Status Select -->
                <select id="status-select" class="filter-select" onchange="onFilterChange()">
                    <option value="">所有状态</option>
                    <option value="solved">已解答</option>
                    <option value="unsolved">未解答</option>
                </select>

                <!-- Reset Button -->
                <button type="button" class="btn-outline-action" onclick="resetFilters()">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset
                </button>
            </div>
        </form>

        <!-- View mode toggles (Outline vs List) -->
        <div class="view-control-bar mb-4">
            <div class="d-flex gap-2">
                <button type="button" class="btn-view-toggle" id="btn-view-outline" onclick="setViewMode('outline')">
                    <i class="bi bi-list-nested"></i> Outline View
                </button>
                <button type="button" class="btn-view-toggle" id="btn-view-list" onclick="setViewMode('list')">
                    <i class="bi bi-table"></i> Question List
                </button>
            </div>
            
            <div id="chapter-controls" class="d-flex gap-2">
                <button type="button" class="btn-outline-action" onclick="toggleAllChapters(true)">
                    <i class="bi bi-chevron-double-down"></i> Expand All
                </button>
                <button type="button" class="btn-outline-action" onclick="toggleAllChapters(false)">
                    <i class="bi bi-chevron-double-up"></i> Collapse All
                </button>
            </div>
        </div>

        <!-- 1. Outline View container -->
        <div id="outline-view-container" class="chapter-accordion">
            <!-- Rendered dynamically -->
        </div>

        <!-- 2. Flat List View container -->
        <div id="list-view-container" class="table-container" style="display: none;">
            <table class="leetcode-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">状态</th>
                        <th>题目</th>
                        <th style="width: 150px;">分类</th>
                        <th style="width: 110px;">难度</th>
                        <th style="width: 110px;">类型</th>
                        <th style="width: 140px; text-align: right;">操作</th>
                    </tr>
                </thead>
                <tbody id="list-view-tbody">
                    <!-- Rendered dynamically -->
                </tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="glass-panel text-center py-5 text-secondary mt-3" style="display: none;">
            <i class="bi bi-inbox fs-1 d-block mb-3" style="color: var(--text-muted);"></i>
            No questions found. Try adjusting your search filters.
        </div>
    </div>
</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Thymeleaf ���� JS ���� -->
<script th:inline="javascript">
    /*<![CDATA[*/
    // 绑定后台Thymeleaf变量
    const allQuestionsJson = /*[[${allQuestionsJson}]]*/ "[]";
    const allQuestions = JSON.parse(allQuestionsJson || "[]");
    
    const solvedTopicsJson = /*[[${solvedTopicsJson}]]*/ "[]";
    const solvedTopicsList = JSON.parse(solvedTopicsJson || "[]");
    const solvedTopics = new Set(solvedTopicsList);
    
    // 初始化筛选条件
    let currentCategory = /*[[${currentCategory}]]*/ "";
    let currentSearch = /*[[${currentSearch}]]*/ "";
    let currentDifficulty = /*[[${currentDifficulty}]]*/ "";

    // 分类卡片过滤
    function filterGrid(tag) {
        activeGridFilter = tag;
        
        // 更新按钮激活状态
        document.querySelectorAll(".filter-pill").forEach(btn => {
            if (btn.getAttribute("data-filter") === tag) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        
        renderCategoryGrid();
    }

    // 获取过滤后的题目列表
    function getFilteredQuestions() {
        return allQuestions.filter(q => {
            // 分类过滤
            if (currentCategory && q.category !== currentCategory) {
                return false;
            }
            // 难度过滤
            if (currentDifficulty && q.difficulty !== currentDifficulty) {
                return false;
            }
            // 题型过滤
            if (currentType && q.questionType !== currentType) {
                return false;
            }
            // 状态过滤
            if (currentStatus) {
                const isSolved = solvedTopics.has(q.title);
                if (currentStatus === 'solved' && !isSolved) return false;
                if (currentStatus === 'unsolved' && isSolved) return false;
            }
            // 搜索过滤
            if (currentSearch) {
                const s = currentSearch.toLowerCase();
                const titleMatch = q.title && q.title.toLowerCase().includes(s);
                const catMatch = q.category && q.category.toLowerCase().includes(s);
                if (!titleMatch && !catMatch) return false;
            }
            return true;
        });
    }

    // 核心渲染与状态同步函数
    function filterAndRender() {
        const filtered = getFilteredQuestions();
        
        // 渲染视图切换决策
        if (!currentCategory && !currentSearch) {
            document.getElementById("category-grid-section").style.display = "block";
            document.getElementById("question-list-section").style.display = "none";
            
            document.getElementById("breadcrumb-current").innerText = "Question Bank";
            renderCategoryGrid();
        } else {
            document.getElementById("category-grid-section").style.display = "none";
            document.getElementById("question-list-section").style.display = "block";
            
            // 更新面包屑和分类页头
            if (currentCategory) {
                const meta = categoryMeta[currentCategory] || { name: currentCategory, desc: "Curated questions" };
                document.getElementById("breadcrumb-current").innerText = "Question Bank / " + meta.name;
                document.getElementById("detail-category-title").innerText = meta.name;
                document.getElementById("detail-category-desc").innerText = meta.desc;
                
                // 计算该分类的进度
                const catQuestions = allQuestions.filter(q => q.category === currentCategory);
                const total = catQuestions.length;
                let solved = 0;
                catQuestions.forEach(q => {
                    if (solvedTopics.has(q.title)) solved++;
                });
                const percent = total > 0 ? Math.round((solved * 100) / total) : 0;
                document.getElementById("detail-category-progress").innerText = percent + "% Completed";
                document.getElementById("detail-category-progress-bar").style.width = percent + "%";
                document.getElementById("detail-progress-wrapper").style.display = "flex";
            } else {
                // 纯搜索状态
                document.getElementById("breadcrumb-current").innerText = "Question Bank / Search Results";
                document.getElementById("detail-category-title").innerText = "Search Results";
                document.getElementById("detail-category-desc").innerText = 'Showing results matching "' + currentSearch + '"';
                document.getElementById("detail-progress-wrapper").style.display = "none";
            }
            
            // 渲染列表或大纲
            if (filtered.length === 0) {
                document.getElementById("outline-view-container").style.display = "none";
                document.getElementById("list-view-container").style.display = "none";
                document.getElementById("empty-state").style.display = "block";
                document.getElementById("chapter-controls").style.display = "none";
            } else {
                document.getElementById("empty-state").style.display = "none";
                if (activeView === "outline" && currentCategory) {
                    document.getElementById("outline-view-container").style.display = "flex";
                    document.getElementById("list-view-container").style.display = "none";
                    document.getElementById("chapter-controls").style.display = "flex";
                    renderOutlineView(filtered);
                } else {
                    document.getElementById("outline-view-container").style.display = "none";
                    document.getElementById("list-view-container").style.display = "block";
                    document.getElementById("chapter-controls").style.display = "none";
                    renderListView(filtered);
                }
            }
        }
        
        updateViewToggleButtons();
    }

    // 视图模式切换按钮高亮
    function updateViewToggleButtons() {
        const btnOutline = document.getElementById("btn-view-outline");
        const btnList = document.getElementById("btn-view-list");
        
        btnOutline.classList.remove("active");
        btnList.classList.remove("active");
        
        if (activeView === "outline") {
            btnOutline.classList.add("active");
        } else {
            btnList.classList.add("active");
        }
        
        // 如果是全站搜索模式（无分类），隐藏 Outline 切换按钮
        if (!currentCategory) {
            btnOutline.style.display = "none";
        } else {
            btnOutline.style.display = "inline-flex";
        }
    }

        document.getElementById("top-search-input").value = "";
        document.getElementById("search-input").value = "";

    function setViewMode(view) {
        activeView = view;
        filterAndRender();

    function updateURL() {
        const params = new URLSearchParams();
        if (currentCategory) params.set("category", currentCategory);
        if (currentDifficulty) params.set("difficulty", currentDifficulty);
        if (currentType) params.set("type", currentType);
        if (currentStatus) params.set("status", currentStatus);
        if (currentSearch) params.set("search", currentSearch);
        
        const newRelativePathQuery = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        history.pushState(null, '', newRelativePathQuery);
    }

    // 折叠/展开章节的函数
    function toggleChapter(element) {
        const card = element.closest(".chapter-card");
        card.classList.toggle("expanded");
    }

    // 根据数据渲染思维大纲图
    function renderOutlineView(questions) {
        const container = document.getElementById("outline-view-container");
        container.innerHTML = ""; // 清空容器
        
        // 划分简单、中等、困难三个章节
        const chapters = [
            { id: "easy", name: "第一章：算法与基础篇 (简单)", difficulty: "简单", class: "chapter-easy" },
            { id: "medium", name: "第二章：中级与实战篇 (中等)", difficulty: "中等", class: "chapter-medium" },
            { id: "hard", name: "第三章：高级与挑战篇 (困难)", difficulty: "困难", class: "chapter-hard" }
        ];
        
        chapters.forEach(chapter => {
            // 获取对应难度下的题目，如果题目没有 difficulty 字段，默认为“简单”
            const chapQuestions = questions.filter(q => {
                const diff = q.difficulty || "简单";
                return diff === chapter.difficulty;
            });
            if (chapQuestions.length === 0) return; // 无题目时不渲染
            
            // 计算进度
            const total = chapQuestions.length;
            let solved = 0;
            chapQuestions.forEach(q => {
                if (solvedTopics.has(q.title)) solved++;
            });
            
            // 区分代码题和理论题
            const codeQuestions = chapQuestions.filter(q => q.questionType === "code");
            const conceptualQuestions = chapQuestions.filter(q => q.questionType === "conceptual" || !q.questionType);
            
            // 构建章节 HTML
            const cardDiv = document.createElement("div");
            cardDiv.className = 'chapter-card expanded ' + chapter.class; // 默认展开
            
            let chapterHTML = '<div class="chapter-header" onclick="toggleChapter(this)">' +
                    '<div class="chapter-header-left">' +
                        '<div class="chapter-indicator"></div>' +
                        '<h4 class="chapter-title">' + chapter.name + '</h4>' +
                    '</div>' +
                    '<div class="chapter-header-right">' +
                        '<span class="chapter-progress-badge">已挑战 ' + solved + ' / ' + total + ' 题</span>' +
                        '<i class="bi bi-chevron-down chapter-toggle-icon"></i>' +
                    '</div>' +
                '</div>' +
                '<div class="chapter-body">' +
                    '<div class="chapter-content">';
            
            // 1. 代码实战题
            if (codeQuestions.length > 0) {
                chapterHTML += '<div class="section-wrapper"><div class="section-title">模块一：代码算法实战</div>';
                codeQuestions.forEach(q => {
                    chapterHTML += renderQuestionRowHTML(q);
                });
                chapterHTML += '</div>';
            }
            
            // 2. 核心原理与架构题
            if (conceptualQuestions.length > 0) {
                chapterHTML += '<div class="section-wrapper"><div class="section-title">模块二：核心架构与原理</div>';
                conceptualQuestions.forEach(q => {
                    chapterHTML += renderQuestionRowHTML(q);
                });
                chapterHTML += '</div>';
            }
            
            chapterHTML += '</div></div>';
            
            cardDiv.innerHTML = chapterHTML;
            container.appendChild(cardDiv);
        });
    }

    // 渲染大纲模式下的单个题目卡片 HTML 字符串
    function renderQuestionRowHTML(q) {
        const isSolved = solvedTopics.has(q.title);
        const statusIcon = isSolved 
            ? '<i class="bi bi-check-circle-fill status-solved" title="已解答"></i>' 
            : '<i class="bi bi-circle status-unsolved" title="未解答"></i>';
            
        const typeStr = q.questionType === 'code' ? '代码题' : '理论题';
        const typeBadgeClass = q.questionType === 'code' ? 'type-code' : 'type-conceptual';
        const typeBadge = '<span class="badge-type ' + typeBadgeClass + '">' + typeStr + '</span>';
            
        const diffStr = q.difficulty ? q.difficulty : '未知';
        const difficultyClass = diffStr === '简单' 
            ? 'difficulty-easy' 
            : (diffStr === '中等' ? 'difficulty-medium' : 'difficulty-hard');
            
        const difficultyBadge = '<span class="badge-difficulty ' + difficultyClass + '">' + diffStr + '</span>';
        
        const solveUrl = '/questions/' + q.id + '/solve';
        
        const btnText = isSolved ? "查看已答" : "开始挑战";
        const btnClass = isSolved ? "btn-challenge btn-challenge-outline" : "btn-challenge btn-challenge-solid";
        const btnIcon = isSolved ? "bi-arrow-repeat" : "bi-play-fill";
        
        return '<div class="question-row-card">' +
                '<div class="question-left-side">' +
                    '<div class="question-status-icon">' + statusIcon + '</div>' +
                    '<a href="' + solveUrl + '" class="question-row-title">' + q.title + '</a>' +
                '</div>' +
                '<div class="question-right-side">' +
                    typeBadge +
                    difficultyBadge +
                    '<a href="' + solveUrl + '" class="' + btnClass + '">' +
                        '<i class="bi ' + btnIcon + '"></i> ' + btnText +
                    '</a>' +
                '</div>' +
            '</div>';
    }

            const typeStr = q.questionType === 'code' ? '代码题' : '理论题';
            const typeBadgeClass = q.questionType === 'code' ? 'type-code' : 'type-conceptual';
            const typeBadge = '<span class="badge-type ' + typeBadgeClass + '">' + typeStr + '</span>';
                
            const btnText = isSolved ? "查看已答" : "开始挑战";
            const btnClass = isSolved ? "btn-challenge btn-challenge-outline" : "btn-challenge btn-challenge-solid";
            const btnIcon = isSolved ? "bi-arrow-repeat" : "bi-play-fill";
            
            const tr = document.createElement("tr");
            tr.innerHTML = statusIcon +
                '<td>' +
                    '<a href="' + solveUrl + '" class="question-row-title text-decoration-none fw-bold">' + q.title + '</a>' +
                '</td>' +
                '<td>' +
                    '<span class="badge-category">' + q.category + '</span>' +
                '</td>' +
                '<td>' +
                    difficultyBadge +
                '</td>' +
                '<td>' +
                    typeBadge +
                '</td>' +
                '<td style="text-align: right;">' +
                    '<a href="' + solveUrl + '" class="' + btnClass + '">' +
                        '<i class="bi ' + btnIcon + '"></i> ' + btnText +
                    '</a>' +
                '</td>';
            tbody.appendChild(tr);
        });
    }
    /*]]>*/
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.querySelector('.sidebar-toggle')) {
            const toggleBtn = document.createElement('div');
            toggleBtn.className = 'sidebar-toggle';
            toggleBtn.innerHTML = '<i class="bi bi-chevron-left"></i>';
            toggleBtn.onclick = function() {
                sidebar.classList.toggle('collapsed');
                const mainContent = document.querySelector('.main-content');
                if (mainContent) mainContent.classList.toggle('expanded');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            };
            sidebar.appendChild(toggleBtn);
            
            document.querySelectorAll('.sidebar .nav-link, .sidebar .btn').forEach(el => {
                Array.from(el.childNodes).forEach(node => {
                    if (node.nodeType === Node.TEXT_NODE && node.textContent.trim().length > 0) {
                        const span = document.createElement('span');
                        span.className = 'nav-text';
                        span.textContent = node.textContent;
                        el.replaceChild(span, node);
                    }
                });
            });

            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
                const mainContent = document.querySelector('.main-content');
                if (mainContent) mainContent.classList.add('expanded');
            }
        }
    });
</script>
</body>
</html>
