<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - MindSpark 面之光</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 8px;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.5);
            color: #f8fafc;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        .logo-text {
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/modern-theme.css}">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-success fs-1 mb-2"></i>
                        <h2 class="logo-text m-0">注册新账号</h2>
                        <p class="text-muted mt-1 small">加入 MindSpark 面之光 开启求职助力</p>
                    </div>
                    
                    <div th:if="${errorMsg}" class="alert alert-danger border-0 bg-danger bg-opacity-25 text-danger text-center small py-2" th:text="${errorMsg}">
                        错误信息
                    </div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted small">用户名</label>
                            <input type="text" class="form-control py-2" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted small">密码</label>
                            <input type="password" class="form-control py-2" id="password" name="password" required minlength="6">
                            <div class="form-text text-muted small mt-1">密码长度至少6位。</div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success py-2 btn-lg">创建账号</button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <a th:href="@{/login}" class="text-muted text-decoration-none small hover-link">已有账号？返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
